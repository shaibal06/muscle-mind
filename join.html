<html>
  <head>
    <title>Join us</title>
    <link rel="stylesheet" href="style.css">
</head>
  <body>
    <h1>Join Now</h1>
    <p>Fill out the form below to join Muscle Mind Gym.</p>
    <div class="form-container">
    <form onsubmit="return false;">
<label>Name:</label>
<input type="text" id="name" required>
<br><br>
<label>Phone:</label>
<input type="tel" id="phone" required>
<br><br>
<label>Email:</label> 
<input type="email" id="email" required>
<br><br>
<label>Age:</label>
<input type="number" id="age" required>
<br><br>
<label>Membership:</label>
<select id="plan">
  <option value="">Select Membership</option>
    <option>Basic Plan</option>
    <option>Premium Plan</option>
    <option>Elite Plan</option>
</select>
<br><br>
<button type="button" onclick="validateForm()">
    Submit
</button>
</form></div>
  <footer>
    <p>© 2026 Muscle Mind Gym | All Rights Reserved</p>
</footer>
<script src="script.js"></script>
    <!-- Loading Popup -->
<div id="loadingPopup" class="popup">
    <div class="popup-box">
        <div class="loader"></div>
        <p>Submitting Membership...</p>
    </div>
</div>

<!-- Success Popup -->
<div id="successPopup" class="popup">
    <div class="popup-box">
        <h2>🎉 Success!</h2>
        <p id="successMessage">Membership Registered Successfully.</p>
<button onclick="window.location.href='thankyou.html'">
    Continue
</button>
    </div>
</div>
    <iframe src="thankyou.html" style="display:none;" aria-hidden="true"></iframe>
</body>
</html>
